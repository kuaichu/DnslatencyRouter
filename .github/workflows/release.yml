name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/dns-latency-router-linux-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/dns-latency-router-agent-linux-amd64 ./cmd/dlr-agent
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/dns-latency-router-windows-amd64.exe .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/dns-latency-router-agent-windows-amd64.exe ./cmd/dlr-agent

          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated release for $GITHUB_REF_NAME"
