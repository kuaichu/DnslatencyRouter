<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Latency Router</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .header .status-badge {
    font-size: 12px; padding: 4px 12px; border-radius: 12px;
    background: #21262d; border: 1px solid #30363d;
  }
  .header .status-badge.running { color: #3fb950; border-color: #3fb950; }
  .header .status-badge.error { color: #f85149; border-color: #f85149; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px;
  }
  .card .label { font-size: 12px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 20px; font-weight: 600; color: #f0f6fc; font-family: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace; }
  .card .sub { font-size: 13px; color: #8b949e; margin-top: 4px; }
  .card .value.success { color: #3fb950; }
  .card .value.warning { color: #d29922; }
  .section-title { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; }
  .chart-container {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 24px;
    height: 200px; position: relative;
  }
  .chart-container canvas { width: 100%; height: 100%; }
  .chart-empty {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #484f58; font-size: 14px;
  }
  .log-container {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
  }
  .log-header {
    padding: 12px 16px; border-bottom: 1px solid #30363d;
    font-size: 14px; font-weight: 600; color: #f0f6fc;
    display: flex; justify-content: space-between; align-items: center;
  }
  .log-header .log-count { font-size: 12px; color: #8b949e; font-weight: 400; }
  .log-body {
    height: 320px; overflow-y: auto; padding: 8px 16px;
    font-family: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
    font-size: 12px; line-height: 1.7;
  }
  .log-body::-webkit-scrollbar { width: 6px; }
  .log-body::-webkit-scrollbar-track { background: #0d1117; }
  .log-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .log-line { color: #8b949e; white-space: pre-wrap; word-break: break-all; }
  .log-line .tag-check { color: #58a6ff; }
  .log-line .tag-ping { color: #3fb950; }
  .log-line .tag-update { color: #d29922; }
  .log-line .tag-error { color: #f85149; }
  .log-line .tag-info { color: #8b949e; }

  /* --- Settings --- */
  .settings-btn {
    background: none; border: 1px solid #30363d; border-radius: 6px;
    color: #8b949e; cursor: pointer; padding: 6px 10px; font-size: 16px;
    transition: color .2s, border-color .2s;
  }
  .settings-btn:hover { color: #f0f6fc; border-color: #58a6ff; }

  .modal-overlay {
    display: none; position: fixed; z-index: 100; inset: 0;
    background: rgba(1,4,9,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px; width: 440px; max-width: 94vw;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .modal h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; margin-bottom: 20px; }
  .modal .field { margin-bottom: 16px; }
  .modal .field label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal .field input {
    width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #0d1117; color: #c9d1d9; font-size: 14px; outline: none;
    font-family: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
    box-sizing: border-box;
  }
  .modal .field input:focus { border-color: #58a6ff; }
  .modal .field .hint { font-size: 11px; color: #484f58; margin-top: 4px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal .actions button {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid #30363d; transition: background .2s;
  }
  .modal .actions .btn-cancel { background: #21262d; color: #c9d1d9; }
  .modal .actions .btn-cancel:hover { background: #30363d; }
  .modal .actions .btn-save { background: #238636; color: #fff; border-color: #2ea043; }
  .modal .actions .btn-save:hover { background: #2ea043; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    padding: 12px 20px; border-radius: 8px; font-size: 13px;
    background: #238636; color: #fff; border: 1px solid #2ea043;
    opacity: 0; transform: translateY(10px); transition: opacity .3s, transform .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #da3633; border-color: #f85149; }

  @media (max-width: 768px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>DNS Latency Router</h1>
  <div>
    <span class="status-badge" id="statusBadge">● running</span>
    <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>管理设置</h2>
    <div class="field">
      <label for="inputTarget">目标域名</label>
      <input type="text" id="inputTarget" placeholder="api.example.com">
      <div class="hint">要探测的目标域名，每次检测会解析此域名并 tcping 所有 IP</div>
    </div>
    <div class="field">
      <label for="inputCustom">自定义域名</label>
      <input type="text" id="inputCustom" placeholder="your-proxy.example.com">
      <div class="hint">你的 Cloudflare A 记录域名，会更新到此域名指向最快 IP</div>
    </div>
    <div class="actions">
      <button class="btn-cancel" id="modalCancel">取消</button>
      <button class="btn-save" id="modalSave">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="label">目标域名</div>
      <div class="value" id="targetDomain">-</div>
      <div class="sub" id="targetSub">等待检测...</div>
    </div>
    <div class="card">
      <div class="label">当前 IP</div>
      <div class="value success" id="currentIP">-</div>
      <div class="sub" id="customDomain">-</div>
    </div>
    <div class="card">
      <div class="label">延迟</div>
      <div class="value" id="latency">-</div>
      <div class="sub" id="latencySub">上次检测</div>
    </div>
    <div class="card">
      <div class="label">下次检测</div>
      <div class="value" id="nextCheck">-</div>
      <div class="sub" id="checkInterval">每 5 分钟</div>
    </div>
  </div>

  <div class="section-title">延迟历史</div>
  <div class="chart-container" id="chartContainer">
    <canvas id="latencyChart"></canvas>
    <div class="chart-empty" id="chartEmpty">暂无数据</div>
  </div>

  <div class="section-title" style="margin-top:24px">实时日志</div>
  <div class="log-container">
    <div class="log-header">
      <span>日志输出</span>
      <span class="log-count" id="logCount">0 条</span>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script>
const logBody = document.getElementById('logBody');
const logCount = document.getElementById('logCount');

const statusBadge = document.getElementById('statusBadge');
const targetDomain = document.getElementById('targetDomain');
const targetSub = document.getElementById('targetSub');
const currentIP = document.getElementById('currentIP');
const customDomain = document.getElementById('customDomain');
const latencyEl = document.getElementById('latency');
const latencySub = document.getElementById('latencySub');
const nextCheck = document.getElementById('nextCheck');
const checkInterval = document.getElementById('checkInterval');

const canvas = document.getElementById('latencyChart');
const ctx = canvas.getContext('2d');
const chartEmpty = document.getElementById('chartEmpty');

let latencyHistory = [];
let countdownTimer = null;
let chartPts = [];
let hoveredIdx = -1;

// --- Chart ---
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 32;
  canvas.height = 170;
}

function drawChart() {
  if (latencyHistory.length === 0) {
    chartEmpty.style.display = 'block';
    return;
  }
  chartEmpty.style.display = 'none';
  resizeCanvas();

  const w = canvas.width;
  const h = canvas.height;
  const pad = { top: 10, bottom: 28, left: 42, right: 10 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  const values = latencyHistory.map(r => r.latency);
  const maxVal = Math.max(...values, 1) * 1.2;
  const minVal = 0;
  const range = maxVal - minVal || 1;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
    const val = (maxVal - (range / 4) * i).toFixed(0);
    ctx.fillStyle = '#484f58';
    ctx.font = '11px "SF Mono", Monaco, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val + ' ms', pad.left - 8, y + 4);
  }

  // Map data to canvas coordinates
  const pts = latencyHistory.map((r, i) => ({
    x: pad.left + (cw / (latencyHistory.length - 1 || 1)) * i,
    y: pad.top + ch - ((r.latency - minVal) / range) * ch,
    latency: r.latency,
    success: r.success,
    time: r.time,
    ip: r.ip || '',
  }));
  chartPts = pts;

  // Gradient fill under the curve
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(88,166,255,0.15)');
  grad.addColorStop(1, 'rgba(88,166,255,0.01)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pad.top + ch);
  for (const p of pts) ctx.lineTo(p.x, p.y);
  ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Smooth bezier curve
  ctx.beginPath();
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  if (pts.length === 1) {
    const p = pts[0];
    ctx.moveTo(p.x - 4, p.y);
    ctx.lineTo(p.x + 4, p.y);
  } else {
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(0, i - 1)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(pts.length - 1, i + 2)];
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      if (i === 0) ctx.moveTo(p1.x, p1.y);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
  }
  ctx.stroke();

  // Points with latency labels
  for (const p of pts) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = p.success ? '#3fb950' : '#f85149';
    ctx.fill();
    ctx.strokeStyle = '#0d1117';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#8b949e';
    ctx.font = '10px "SF Mono", Monaco, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.latency.toFixed(1) + 'ms', p.x, p.y - 9);
  }

  // X-axis time labels
  if (pts.length > 1) {
    ctx.fillStyle = '#484f58';
    ctx.font = '10px "SF Mono", Monaco, monospace';
    ctx.textAlign = 'center';
    const maxLabels = Math.max(2, Math.floor(cw / 70));
    const step = Math.max(1, Math.floor((pts.length - 1) / maxLabels));
    for (let i = 0; i < pts.length; i += step) {
      const t = new Date(latencyHistory[i].time);
      const label = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
      ctx.fillText(label, pts[i].x, h - 5);
    }
  }

  // Tooltip on hover
  if (hoveredIdx >= 0 && hoveredIdx < pts.length) {
    const p = pts[hoveredIdx];
    const t = new Date(p.time);

    // Draw vertical line
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(88,166,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.moveTo(p.x, pad.top);
    ctx.lineTo(p.x, pad.top + ch);
    ctx.stroke();
    ctx.setLineDash([]);

    // Tooltip box
    const tipLines = [
      t.toLocaleString(),
      p.latency.toFixed(2) + ' ms',
      p.ip || '',
    ];
    const lineH = 16;
    const tipW = 170;
    const tipH = tipLines.length * lineH + 14;
    let tipX = p.x + 14;
    let tipY = p.y - tipH / 2;
    if (tipX + tipW > w - pad.right) tipX = p.x - tipW - 14;
    if (tipY < pad.top) tipY = pad.top;
    if (tipY + tipH > pad.top + ch) tipY = pad.top + ch - tipH;

    // Box background
    ctx.fillStyle = 'rgba(22,27,34,0.95)';
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    roundRect(ctx, tipX, tipY, tipW, tipH, 6);
    ctx.fill();
    ctx.stroke();

    // Text lines
    ctx.fillStyle = '#f0f6fc';
    ctx.font = 'bold 11px "SF Mono", Monaco, monospace';
    ctx.textAlign = 'left';
    ctx.fillText(t.toLocaleString(), tipX + 10, tipY + 14);

    ctx.fillStyle = p.success ? '#3fb950' : '#f85149';
    ctx.font = '12px "SF Mono", Monaco, monospace';
    ctx.fillText(p.latency.toFixed(2) + ' ms', tipX + 10, tipY + 14 + lineH);

    if (p.ip) {
      ctx.fillStyle = '#8b949e';
      ctx.font = '10px "SF Mono", Monaco, monospace';
      ctx.fillText(p.ip, tipX + 10, tipY + 14 + lineH * 2);
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- SSE ---
const evtSource = new EventSource('/api/events');

evtSource.addEventListener('status', function(e) {
  const s = JSON.parse(e.data);
  targetDomain.textContent = s.targetDomain || '-';
  currentIP.textContent = s.currentIP || '-';
  customDomain.textContent = s.customDomain || '-';

  if (s.latency) {
    latencyEl.textContent = s.latency.toFixed(2) + ' ms';
    latencyEl.className = 'value ' + (s.latency < 150 ? 'success' : s.latency < 300 ? 'warning' : '');
    latencySub.textContent = '检测于 ' + (s.lastCheck ? new Date(s.lastCheck).toLocaleTimeString() : '-');
  } else {
    latencyEl.textContent = '-';
    latencyEl.className = 'value';
  }

  if (s.isRunning) {
    statusBadge.textContent = '● running';
    statusBadge.className = 'status-badge running';
  } else {
    statusBadge.textContent = '● error';
    statusBadge.className = 'status-badge error';
  }

  // Countdown
  if (s.nextCheck) {
    const next = new Date(s.nextCheck).getTime();
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(function() {
      const now = Date.now();
      const diff = Math.max(0, Math.floor((next - now) / 1000));
      const m = Math.floor(diff / 60);
      const sec = diff % 60;
      nextCheck.textContent = m + 'm ' + sec + 's';
      if (diff === 0) clearInterval(countdownTimer);
    }, 200);
  }

  targetSub.textContent = s.discoveredCount ? '发现 ' + s.discoveredCount + ' 个 IP' : '';
  checkInterval.textContent = '每 ' + (s.checkIntervalSec || 300) + ' 秒';
});

evtSource.addEventListener('log', function(e) {
  const msg = e.data;

  const line = document.createElement('div');
  line.className = 'log-line';

  const colorMap = {
    '[check]': 'tag-check',
    '[ping]': 'tag-ping',
    '[update]': 'tag-update',
    '[error]': 'tag-error',
  };
  let colored = msg;
  for (const [tag, cls] of Object.entries(colorMap)) {
    if (msg.includes(tag)) {
      colored = msg.replace(tag, '<span class="' + cls + '">' + tag + '</span>');
      break;
    }
  }
  line.innerHTML = colored;
  logBody.appendChild(line);
  logBody.scrollTop = logBody.scrollHeight;

  const lines = logBody.children.length;
  logCount.textContent = lines + ' 条';
});

evtSource.addEventListener('history', function(e) {
  latencyHistory = JSON.parse(e.data);
  drawChart();
});

evtSource.addEventListener('ping', function() {
  // keepalive — do nothing
});

evtSource.onerror = function() {
  statusBadge.textContent = '● disconnected';
  statusBadge.className = 'status-badge error';
};

// --- Settings ---
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const inputTarget = document.getElementById('inputTarget');
const inputCustom = document.getElementById('inputCustom');
const modalCancel = document.getElementById('modalCancel');
const modalSave = document.getElementById('modalSave');
const toast = document.getElementById('toast');

function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function() { toast.className = 'toast'; }, 3000);
}

function openSettings() {
  fetch('/api/config').then(r => r.json()).then(data => {
    inputTarget.value = data.target_domain || '';
    inputCustom.value = data.custom_domain || '';
    settingsModal.classList.add('active');
  }).catch(function() {
    showToast('获取配置失败', true);
  });
}

function closeSettings() {
  settingsModal.classList.remove('active');
}

settingsBtn.addEventListener('click', openSettings);
modalCancel.addEventListener('click', closeSettings);
settingsModal.addEventListener('click', function(e) {
  if (e.target === settingsModal) closeSettings();
});

modalSave.addEventListener('click', function() {
  const target = inputTarget.value.trim();
  const custom = inputCustom.value.trim();
  if (!target || !custom) {
    showToast('两个域名都不能为空', true);
    return;
  }

  modalSave.disabled = true;
  modalSave.textContent = '保存中...';

  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ target_domain: target, custom_domain: custom }),
  }).then(r => r.json()).then(data => {
    if (data.ok) {
      showToast('配置已保存，下次检测将使用新域名');
      closeSettings();
    } else {
      showToast(data.error || '保存失败', true);
    }
  }).catch(function() {
    showToast('请求失败', true);
  }).finally(function() {
    modalSave.disabled = false;
    modalSave.textContent = '保存';
  });
});

// --- Chart hover tooltip ---
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  let found = -1;
  for (let i = 0; i < chartPts.length; i++) {
    const dx = mx - chartPts[i].x;
    const dy = my - chartPts[i].y;
    if (dx * dx + dy * dy < 100) { // 10px radius
      found = i;
      break;
    }
  }
  if (found !== hoveredIdx) {
    hoveredIdx = found;
    drawChart();
  }
});

canvas.addEventListener('mouseleave', function() {
  if (hoveredIdx !== -1) {
    hoveredIdx = -1;
    drawChart();
  }
});

// --- Init ---
resizeCanvas();
</script>
</body>
</html>
