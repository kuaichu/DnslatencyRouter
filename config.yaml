  zone_id: "064c2397c4b9c353ee78a10892b2d6cf"             # Cloudflare Zone ID
  record_id: "ed878cfb7eec9ca4cf57e5f3ba631684"           # RD_ID - DNS Record ID of CUSTOM_DOMAIN's A record

# The domain whose IPs we probe (e.g. api.openai.com, api.deepseek.com)
